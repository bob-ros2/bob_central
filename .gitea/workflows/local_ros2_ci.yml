name: Local ROS 2 CI (Nucleus Only)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.rst'
  pull_request:
    branches: [ "main" ]

jobs:
  local-test:
    runs-on: ros-humble
    container:
      image: ros:humble
    steps:
      - name: Install Node.js for Checkout Action
        run: |
          # The official checkout action requires node, which is missing in ROS images.
          apt-get update && apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Test (Nucleus 0.3.0)
        run: |
          /bin/bash -c "source /opt/ros/humble/setup.sh && \
          mkdir -p /tmp/ws/src && \
          cp -r . /tmp/ws/src/bob_central && \
          cd /tmp/ws && \
          echo 'Executing colcon build...' && \
          colcon build --packages-select bob_central && \
          echo 'Executing linter tests...' && \
          colcon test --packages-select bob_central && \
          echo 'Generating test report...' && \
          colcon test-result --verbose"
