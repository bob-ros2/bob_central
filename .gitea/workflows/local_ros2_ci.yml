name: Local ROS 2 CI (Nucleus Only)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.rst'
  pull_request:
    branches: [ "main" ]

jobs:
  local-test:
    runs-on: ros-humble
    container:
      image: ros:humble
    steps:
      - name: Bootstrap Node.js 20 and Network
        run: |
          # 1. Install dependencies for node and network probing
          apt-get update && apt-get install -y curl iproute2 iputils-ping
          
          # 2. Install Node 20
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          
          # 3. Fix DNS resolution for eva-gitea
          # We know the IP is 192.168.32.7 from previous telemetry
          echo "192.168.32.7 eva-gitea" >> /etc/hosts
          echo "Network fix applied: eva-gitea mapped to 192.168.32.7"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Test (Nucleus 0.3.0)
        run: |
          /bin/bash -c "source /opt/ros/humble/setup.sh && \
          mkdir -p /tmp/ws/src && \
          cp -r . /tmp/ws/src/bob_central && \
          cd /tmp/ws && \
          echo 'Executing colcon build...' && \
          colcon build --packages-select bob_central && \
          echo 'Executing linter tests...' && \
          colcon test --packages-select bob_central && \
          echo 'Generating test report...' && \
          colcon test-result --verbose"
