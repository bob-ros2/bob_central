name: Local ROS 2 CI (Nucleus Only)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.rst'
  pull_request:
    branches: [ "main" ]

jobs:
  local-test:
    runs-on: ros-humble
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Test Dependencies
        run: |
          # Ensure linter tools are present in the runner environment
          if ! dpkg -l | grep -q "ros-humble-ament-cmake-test"; then
            echo "Installing missing ROS 2 test dependencies..."
            sudo apt-get update && sudo apt-get install -y \
              ros-humble-ament-cmake-test \
              ros-humble-ament-lint-auto \
              ros-humble-ament-copyright \
              ros-humble-ament-flake8 \
              ros-humble-ament-pep257 \
              ros-humble-ament-cmake-lint \
              ros-humble-ament-xmllint
          fi

      - name: Build and Test (Local Optimized)
        run: |
          /bin/bash -c "source /opt/ros/humble/setup.sh && \
          mkdir -p /tmp/ws/src && \
          cp -r . /tmp/ws/src/bob_central && \
          cd /tmp/ws && \
          echo 'Executing colcon build...' && \
          colcon build --packages-select bob_central && \
          echo 'Executing linter tests...' && \
          colcon test --packages-select bob_central && \
          echo 'Generating test report...' && \
          colcon test-result --verbose"
