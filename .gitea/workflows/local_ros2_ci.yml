name: Local ROS 2 CI (Nucleus Only)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.rst'
  pull_request:
    branches: [ "main" ]

jobs:
  local-test:
    runs-on: ros-humble
    steps:
      # We SKIP actions/checkout because it requires Node.js inside the container.
      # Local act runners typically mount the repo directly into the workspace.
      
      - name: Verify and Prepare Local Workspace
        run: |
          echo "Initializing Node-free CI environment..."
          # Check if we have the files
          if [ ! -f "package.xml" ]; then
            echo "ERROR: Code files not found in container! Act mount failed?"
            ls -la
            # Fallback: Try manual git clone if git is available
            if command -v git &> /dev/null; then
               echo "Attempting manual git clone..."
               git clone . /tmp/manual_clone && cd /tmp/manual_clone
            else
               exit 1
            fi
          fi
          
          echo "Installing Test Dependencies (if missing)..."
          if ! dpkg -l | grep -q "ros-humble-ament-cmake-test"; then
            sudo apt-get update && sudo apt-get install -y \
              ros-humble-ament-cmake-test \
              ros-humble-ament-lint-auto \
              ros-humble-ament-copyright \
              ros-humble-ament-flake8 \
              ros-humble-ament-pep257
          fi

      - name: Build and Test (Node-free)
        run: |
          /bin/bash -c "source /opt/ros/humble/setup.sh && \
          mkdir -p /tmp/ws/src && \
          # Copy current dir to workspace src
          cp -r . /tmp/ws/src/bob_central && \
          cd /tmp/ws && \
          echo 'Executing colcon build...' && \
          colcon build --packages-select bob_central && \
          echo 'Executing linter tests...' && \
          colcon test --packages-select bob_central && \
          echo 'Generating test report...' && \
          colcon test-result --verbose"
