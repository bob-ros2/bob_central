name: Local ROS 2 CI (Nucleus Only)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.rst'
  pull_request:
    branches: [ "main" ]

jobs:
  local-test:
    runs-on: ros-humble
    container:
      image: ros:humble
    steps:
      - name: Bootstrap Node.js 20 and Network
        run: |
          # 1. Install dependencies
          apt-get update && apt-get install -y curl iproute2
          
          # 2. Install Node 20
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          
          # 3. Dynamic Network Fix
          # Map eva-gitea to the host gateway because Gitea is exposed on 6060 on the host
          GATEWAY_IP=$(ip route show | grep default | awk '{print $3}')
          echo "$GATEWAY_IP eva-gitea" >> /etc/hosts
          echo "Mapped eva-gitea to host gateway: $GATEWAY_IP"
          
          # 4. Git Rewrite to handle the port mapping (act uses 3000 default)
          # We tell git to use 6060 whenever it tries 3000 for this host
          git config --global url."http://eva-gitea:6060/".insteadOf "http://eva-gitea:3000/"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Test (Nucleus 0.3.0)
        run: |
          /bin/bash -c "source /opt/ros/humble/setup.sh && \
          mkdir -p /tmp/ws/src && \
          cp -r . /tmp/ws/src/bob_central && \
          cd /tmp/ws && \
          echo 'Executing colcon build...' && \
          colcon build --packages-select bob_central && \
          echo 'Executing linter tests...' && \
          colcon test --packages-select bob_central && \
          echo 'Generating test report...' && \
          colcon test-result --verbose"
