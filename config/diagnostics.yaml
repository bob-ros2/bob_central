# diagnostics.yaml - Final Fixed ROS 2 Humble/Iron format
diag_aggregator:
  ros__parameters:
    pub_rate: 1.0
    
    # This list is MANDATORY for the C++ aggregator to parse the namespaces correctly.
    # It resolves the "expected [string_array] got [string]" error.
    analyzers: ["mesh_swarm", "mesh_brain", "mesh_persistence"]

    mesh_swarm:
      type: 'diagnostic_aggregator/AnalyzerGroup'
      path: 'Swarm'
      # Nested analyzers names list
      analyzers: ["scout", "coordinator"]
      scout:
        type: 'diagnostic_aggregator/GenericAnalyzer'
        path: 'Scout'
        contains: ['eva_swarm_scout']
        timeout: 310.0
      coordinator:
        type: 'diagnostic_aggregator/GenericAnalyzer'
        path: 'Coordinator'
        contains: ['eva_swarm_coordinator']
        timeout: 30.0

    mesh_brain:
      type: 'diagnostic_aggregator/AnalyzerGroup'
      path: 'Brain'
      analyzers: ["agency"]
      agency:
        type: 'diagnostic_aggregator/GenericAnalyzer'
        path: 'Agency'
        contains: ['agency_daemon']
        timeout: 10.0

    mesh_persistence:
      type: 'diagnostic_aggregator/GenericAnalyzer'
      path: 'Persistence'
      # Since it's just one analyzer, we can skip the group analyzers list if it's a direct analyzer
      contains: ['qdrant_registry']
      timeout: 30.0
