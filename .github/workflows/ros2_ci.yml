name: ROS 2 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  LANG: en_US.UTF-8

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@0.7.15
        with:
          required-ros-distributions: humble

      - name: Build and Test
        uses: ros-tooling/action-ros-ci@0.4.6
        with:
          package-name: bob_central
          target-ros2-distro: humble
          vcs-repo-file-url: ""
          import-token: ${{ secrets.GITHUB_TOKEN }}
