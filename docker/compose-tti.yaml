# -- Artist Subsystem --
name: eva-artist

networks:
  eva-net:
    external: true

# Persistent storage for diffusion weights
volumes:
  models:
    name: eva_models
    external: true

services:
  # -- TTI --
  artist:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.tti
      args:
        # Defaults to humble if ROS_DISTRO is not set in env
        ROS_DISTRO: ${ROS_DISTRO:-humble}
    container_name: eva-artist
    networks:
      - eva-net
    env_file:
      - ../.env
    environment:
      - TTI_MODEL_TYPE=sdxl_turbo
      - TTI_MODELS_PATH=/models
      - TTI_OUTPUT_PATH=/root/eva/media/eva_artist.jpg
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1
    # Launch the artist-only orchestrator (with correct GPU/Model paths)
    command: >
      ros2 launch bob_launch generic.launch.py 
      config:=/ros2_ws/src/bob_central/launch/tti_launch.yaml
    volumes:
      - /volume1/ros/eva:/root/eva # Shared workspace for visuals (self-inspection)
      - models:/models # Dedicated persistent volume for models
      - /volume1/ros/secrets/huggingface_token:/root/.cache/huggingface/token:ro
      - /tmp/eva:/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
