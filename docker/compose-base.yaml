# -- Eva Intelligence & Logic (The Base Hub) --
name: eva-base

networks:
  eva-net:
    external: true

# Base Logic uses host mode for seamless ROS 2 (DDS) discovery
# This makes topics visible across the entire host network

services:
  # -- GATEWAY: API SECURE PROXY --
  api-gateway:
    image: nginx:alpine
    container_name: eva-api-gate
    networks:
      - eva-net
    env_file:
      - /volume1/ros/secrets/deepseek.env
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro

  # -- GITEA: LOCAL CODE HUB (Eva's Sandbox) --
  gitea:
    image: gitea/gitea:latest
    container_name: eva-gitea
    networks:
      - eva-net
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
    volumes:
      - /tmp/eva/gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "6060:3000"
      - "622:22"
    restart: always

  # -- CORE: EVA (Brain & Logic) --
  base:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.base
      args:
        # Defaults to humble if ROS_DISTRO is not set in env
        ROS_DISTRO: ${ROS_DISTRO:-humble}
    container_name: eva-base
    networks:
      - eva-net
    env_file:
      - ../.env
    environment:
      - ROS_DOMAIN_ID=50 # Synched with your setup
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
    # Launch the brain-only orchestrator
    command: ros2 launch bob_launch generic.launch.py config:=/ros2_ws/src/bob_central/launch/orch_eva.yaml
    volumes:
      - /tmp/eva:/tmp/eva # Shared workspace for logos, images, logs
      - /tmp/eva/ssh:/root/.ssh # Persistent AI Identity (Keys)
      - ..:/ros2_ws/src/bob_central # Persistent Source Code (Self-Evolution)

  # -- RUNNER: LOCAL ACTIONS (Eva's CI) --
  act-runner:
    image: gitea/act_runner:latest
    container_name: eva-runner
    networks:
      - eva-net
    volumes:
      - /tmp/eva/runner_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GITEA_INSTANCE_URL=http://eva-gitea:3000
      - GITEA_RUNNER_REGISTRATION_TOKEN=2B0G4dCfvHXL4OP4CJ7qYDspzw1tepeFjzfIGCzb
      - GITEA_RUNNER_NAME=eva-nucleus-runner
      - GITEA_RUNNER_LABELS=ubuntu-latest:docker://catthehacker/ubuntu:act-latest,ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04,ros-humble:docker://ros:humble-ros-base
    restart: always
