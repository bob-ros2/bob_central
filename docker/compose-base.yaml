# -- Eva Intelligence & Logic (The Base Hub) --
name: eva-base

networks:
  eva-net:
    external: true

services:
  # -- GATEWAY: API SECURE PROXY --
  api-gateway:
    image: nginx:alpine
    container_name: eva-api-gate
    networks:
      - eva-net
    env_file:
      - /volume1/ros/secrets/deepseek.env
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: always

  # -- CORE: EVA (Brain & Logic) --
  base:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.base
      args:
        ROS_DISTRO: ${ROS_DISTRO:-humble}
    container_name: eva-base
    networks:
      - eva-net
    env_file:
      - ../.env
    environment:
      - ROS_DOMAIN_ID=50
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      - MASTER_SEARXNG_URL=http://192.168.1.10:9080/search
      - MASTER_SEARXNG_LANGUAGE=en-US
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ros2 launch bob_launch generic.launch.py config:=/ros2_ws/src/bob_central/launch/orch_eva.yaml
    volumes:
      - /volume1/ros/eva:/root/eva # Unified persistent home
      - /volume1/ros/eva/ssh:/root/.ssh # Persistent AI Identity (Keys)
      - /tmp/eva:/tmp
    restart: on-failure
