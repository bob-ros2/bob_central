# -- Eva Intelligence & Logic (The Base Hub) --
name: eva-base

networks:
  eva-net:
    external: true

services:
  # -- GATEWAY: API SECURE PROXY --
  api-gateway:
    image: nginx:alpine
    container_name: eva-api-gate
    networks:
      - eva-net
    env_file:
      - /volume1/ros/secrets/deepseek.env
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: always

  # -- CORE: EVA (Brain & Logic) --
  base:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.base
      args:
        ROS_DISTRO: ${ROS_DISTRO:-humble}
    container_name: eva-base
    networks:
      - eva-net
    env_file:
      - ../.env
    environment:
      - ROS_DOMAIN_ID=50
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
    # Automatically generate SSH identity if missing before launching
    command: >
      /bin/bash -c "
      if [ ! -f /root/.ssh/id_rsa ]; then
        echo 'Initializing Eva SSH Identity in /volume1/ros/eva/ssh...'
        mkdir -p /root/.ssh
        ssh-keygen -t rsa -b 4096 -f /root/.ssh/id_rsa -N ''
        chmod 700 /root/.ssh && chmod 600 /root/.ssh/id_rsa && chmod 644 /root/.ssh/id_rsa.pub
      fi
      exec ros2 launch bob_launch generic.launch.py config:=/ros2_ws/src/bob_central/launch/orch_eva.yaml
      "
    volumes:
      - /volume1/ros/eva:/volume1/ros/eva # Unified persistent home
      - /volume1/ros/eva/ssh:/root/.ssh # Persistent AI Identity (Keys)
      - ..:/ros2_ws/src/bob_central # Persistent Source Code (Self-Evolution)
    restart: on-failure
