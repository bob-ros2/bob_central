# -- Eva Intelligence & Logic (The Base Hub) --
name: eva-base

networks:
  eva-net:
    external: true

# Base Logic uses host mode for seamless ROS 2 (DDS) discovery
# This makes topics visible across the entire host network

services:
  # -- GATEWAY: API SECURE PROXY --
  api-gateway:
    image: nginx:alpine
    container_name: eva-api-gate
    networks:
      - eva-net
    env_file:
      - /volume1/ros/secrets/deepseek.env
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro

  # -- CORE: EVA (Brain & Logic) --
  base:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.base
      args:
        # Pass the desired ROS distribution (default: humble)
        ROS_DISTRO: ${ROS_DISTRO:-humble}
    container_name: eva-base
    networks:
      - eva-net
    env_file:
      - ../.env
    environment:
      - ROS_DOMAIN_ID=50 # Synched with your setup
    # Launch the brain-only orchestrator
    command: ros2 launch bob_launch generic.launch.py config:=/ros2_ws/src/bob_central/launch/orch_eva.yaml
    volumes:
      - /tmp/eva:/tmp # Shared folder for visuals (Vision skill self-inspection)
