# -- Eva Twitch Chat Bot (Tbot) --
name: eva-tbot

networks:
  eva-net:
    external: true

secrets:
  twitch_credentials:
    file: /volume1/ros/secrets/credentials_bobassi.json

services:
  # -- TBOT: Twitch Interaction & Filtering --
  tbot:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.tbot
    container_name: eva-tbot
    networks:
      - eva-net
    environment:
      - ROS_DOMAIN_ID=50
      - TWITCH_CHAT_CHANNEL=bobassi
      # Passing the path to the Docker Secret
      - TWITCH_CHAT_CREDENTIALS=/run/secrets/twitch_credentials
      - JLOG_DB_URL=http://admin:password@api-gateway:5984/memo_db
    secrets:
      - twitch_credentials
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
