# -- Eva Memory Layer (Vector Database) --
name: eva-memory

networks:
  eva-net:
    external: true

services:
  # -- QDRANT: Long-Term Context & Knowledge --
  qdrant:
    image: qdrant/qdrant:latest
    container_name: eva-qdrant
    networks:
      - eva-net
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - /volume1/ros/eva/qdrant:/qdrant/storage/
    restart: always
