# -- Eva Visualization System (SDL 2.0 Renderer) --
name: eva-sdlviz

networks:
  eva-net:
    external: true

services:
  # -- SDLVIZ: High-Performance 2D/Marker Overlay --
  sdlviz:
    image: ghcr.io/bob-ros2/bob-sdlviz:latest
    container_name: eva-sdlviz
    networks:
      - eva-net
    environment:
      # ROS configuration
      - ROS_DOMAIN_ID=50
      # Standardized SDLVIZ configuration
      - SDLVIZ_WIDTH=854
      - SDLVIZ_HEIGHT=480
      - SDLVIZ_FPS=30
      - SDLVIZ_SHOW_WINDOW=false
      - SDLVIZ_FONT_SIZE=18
      # Headless support (force dummy driver for container execution)
      - SDL_VIDEODRIVER=dummy
      - SDLVIZ_STREAM_OUTPUT=true
      - SDLVIZ_STREAM_PATH=/tmp/video_pipe
      - SDLVIZ_CONFIG_PATH=/config/sdlviz_layout.json
    volumes:
      - /tmp/eva:/tmp
      - ../config/sdlviz_layout.json:/config/sdlviz_layout.json:ro
    restart: unless-stopped
    # Overriding the default entrypoint (start_stream.sh) to only run the node
    entrypoint: ["/bin/bash", "-c", "source /opt/ros/humble/setup.bash && source /ros2_ws/install/setup.bash && exec \"$@\"", "bash"]
    command: >
      ros2 run bob_sdlviz sdlviz 
      --ros-args 
      -r __ns:=/eva/viz

  # -- WEBVIDEO: Offscreen Chromium for UI Overlays --
  webvideo:
    image: ghcr.io/bob-ros2/bob-avtools:latest
    container_name: eva-webvideo
    networks:
      - eva-net
    environment:
      - ROS_DOMAIN_ID=50
      - WEBVIDEO_WIDTH=854
      - WEBVIDEO_HEIGHT=480
      - WEBVIDEO_FPS=30
      - WEBVIDEO_FIFO_PATH=/tmp/web_fifo
      - QT_QPA_PLATFORM=offscreen
    volumes:
      - /tmp/eva:/tmp
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c", "source /opt/ros/humble/setup.bash && source /ros2_ws/install/setup.bash && exec \"$@\"", "bash"]
    command: >
      ros2 run bob_av_tools webvideo 
      --ros-args 
      -r __ns:=/eva/viz
