# -- Eva Edge Subsystem (ARM/Pi Optimized) --
# Minimal Eva instance for edge processing without databases.
name: eva-edge

networks:
  eva-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.32.0/24

secrets:
  twitch_key:
    file: /volume1/ros/secrets/streamkey_bobassi

services:
  # -- DNS: Discovery & AdBlocking --
  dns:
    # Use a fixed ARM64 tag. Update if newer ARM64 releases appear.
    image: adguard/adguardhome:v0.107.43
    platform: linux/arm64
    container_name: eva-edge-dns
    networks:
      eva-net:
        ipv4_address: 192.168.32.100
    volumes:
      - ~/eva_data/dns/work:/opt/adguardhome/work
      - ~/eva_data/dns/conf:/opt/adguardhome/conf
    ports:
      - "3000:3000"     # Needed for the Web-UI Setup
    restart: unless-stopped

  # -- GATEWAY: API Secure Proxy --
  api-gateway:
    # Fixed nginx tag with ARM64 manifest. Change if newer stable tag needed.
    image: nginx:1.27-alpine
    platform: linux/arm64
    container_name: eva-edge-gate
    networks:
      - eva-net
    env_file:
      - ../.env
    volumes:
      - ../config/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: always

  # -- CORE: EVA (Brain & Logic) --
  base:
  
    image: ghcr.io/bob-ros2/bob-base:arm64
    # OR
    #build:
    #  context: ../
    #  dockerfile: ./docker/Dockerfile.base
    #  args:
    #    ROS_DISTRO: ${ROS_DISTRO:-humble}

    platform: linux/arm64
    container_name: eva-edge-base
    networks:
      - eva-net
    env_file:
      - ../.env
    environment:
      - MASTER_SEARXNG_LANGUAGE=en-US
      - BOB_LAUNCH_AUTOABORT=0
    # No GPU reservation for ARM devices
    command: ros2 launch bob_launch generic.launch.py config:=/ros2_ws/src/bob_central/launch/eva_base_launch.yaml
    dns: ["192.168.32.100"]
    volumes:
      - ../:/ros2_ws/src/bob_central
      - ~/eva_data/base/media:/root/eva/media
      - ~/eva_data/base/logs:/root/eva/logs
      - ~/eva_data/base/ssh:/root/.ssh
    restart: on-failure

  # -- STREAMER: Nviz Visual Output --
  nviz:
    # Specific Nviz tag known to have ARM64 build.
    image: ghcr.io/bob-ros2/bob-nviz:arm64
    platform: linux/arm64
    container_name: eva-edge-nviz
    networks:
      - eva-net
    restart: unless-stopped
    secrets:
      - twitch_key
    env_file:
      - ../.env
    environment:
      # Twitch Config from Secret
      - TWITCH_STREAM_KEY_FILE=/run/secrets/twitch_key
      - TWITCH_STREAM_KEY_FILE_NAME=/run/secrets/twitch_key
      #- INGEST_SERVER=rtmp://live-fra.twitch.tv/app/
      # Test Mode
      # ffplay -listen 1 -protocol_whitelist file,rtmp,tcp rtmp://0.0.0.0:1234
      #- INGEST_SERVER=rtmp://192.168.1.47:1234
      - INGEST_SERVER=rtmp://bob:1234
      - NAMESPACE=/eva/streamer
      - NVIZ_WIDTH=854
      - NVIZ_HEIGHT=480
      - NVIZ_FPS=15 # Lower FPS for Pi stability
      - NVIZ_CONFIG_PATH=/ros2_ws/src/bob_central/config/layout_main.json
    command: [ "/ros2_ws/src/bob_nviz/scripts/start_stream.sh" ]
    volumes:
      - /tmp/eva:/tmp
      - ../config/layout_main.json:/ros2_ws/src/bob_central/config/layout_main.json:ro
