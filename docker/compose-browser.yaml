# -- Browser Subsystem (Playwright) --
name: eva-browser

networks:
  eva-net:
    external: true

services:
  browser:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.browser
    container_name: eva-browser
    networks:
      - eva-net
    env_file:
      - ../.env
    environment:
      - BROWSER_VIEWPORT_WIDTH=1280
      - BROWSER_VIEWPORT_HEIGHT=720
    dns: ["192.168.32.100"]
    volumes:
      - ../:/ros2_ws/src/bob_central
      - /volume1/ros/eva/media:/root/eva/media # Restrict access to media
      - /volume1/ros/eva/logs:/root/eva/logs   # Restrict access to logs
      - /tmp/eva_browser:/tmp
    restart: unless-stopped
    # Use the headless browser node
    command: python3 /ros2_ws/src/bob_central/bob_central/browser_daemon_node.py
