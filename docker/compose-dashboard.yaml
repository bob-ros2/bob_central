name: eva-dashboard

networks:
  eva-net:
    external: true

services:
  smallchat:
    image: ghcr.io/bob-ros2/bob-avtools:latest
    container_name: eva-dashboard-smallchat
    networks:
      - eva-net
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Webvideo Config
      - WEBVIDEO_WIDTH=426
      - WEBVIDEO_HEIGHT=480
      - WEBVIDEO_FPS=5
      - WEBVIDEO_FIFO_PATH=/tmp/smallchat_pipe
      - WEBVIDEO_FIFO_ALPHA=False
      - WEBVIDEO_MAX_TEXT_LENGTH=8192
      # Paths (Matched to internal volume mount)
      - WEBVIDEO_UI_PATH=/ros2_ws/src/bob_av_tools/bob_av_tools/smallchat.html

    # Entrypoint that ensures the FIFO exists before running the node
    command: >
      bash -c "
      mkfifo /tmp/smallchat_pipe || true;
      ros2 run bob_av_tools webvideo --ros-args 
      -p width:=$${WEBVIDEO_WIDTH:-426} 
      -p height:=$${WEBVIDEO_HEIGHT:-480} 
      -p fifo_path:=$${WEBVIDEO_FIFO_PATH:-/tmp/smallchat_pipe} 
      -p ui_path:=$${WEBVIDEO_UI_PATH} 
      -p fifo_alpha:=$${WEBVIDEO_FIFO_ALPHA:-false} 
      -r llm_reasoning:=/eva/llm_reasoning 
      -r llm_stream:=/eva/llm_stream 
      -r llm_query:=/eva/llm_query_trigger
      -r llm_tool_calls:=/eva/llm_tool_calls
      -r __ns:=/eva/streamer
      "
    volumes:
      - /tmp/eva:/tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
