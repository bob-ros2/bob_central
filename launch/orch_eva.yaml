# --- Eva Core Brain (Logic & Conversation) ---
# Separated from TTI to avoid dependency conflicts

- &api_orchestrator "${ORCHESTRATOR_API_URL}"
- &api_researcher   "${RESEARCHER_API_URL}"

- &eva_ns    "__ns:=/eva"
- &tts_ns    "__ns:=/eva/tts"
- &synth_ns  "__ns:=/eva/sounds"
- &log_level "debug"

# --- THE UNIFIED BRAIN-MESH ---

# Internal Logic (Identity & Time Injector)
- name: logic
  package: bob_central
  executable: orchestrator
  respawn: true
  output: screen
  arguments:
    - --ros-args
    - --log-level
    - info
    - -p
    - "busy_timeout:=300.0"
    - -r
    - "user_query:=/eva/user_query"
    - -r
    - "user_query_timed:=~/internal/query_timed"
    - -r
    - "user_response:=~/internal/full_response_text"
    - -r
    - "brain_mesh_routing:=~/internal/mesh_routing"
    - -r
    - "specialist_response:=~/internal/specialist_response"
    - -r
    - "internal/eva_stream:=/eva/brain_eva/internal/eva_stream"
    - -r
    - "bobassi_query:=/eva/bobassi/user_query"
    - -r
    - "bobassi_response:=/eva/bobassi/response"
    - -r
    - *eva_ns

# Eva: The Core Consciousness (Deep Reasoning)
- name: brain_eva
  package: bob_llm
  executable: llm
  respawn: true
  output: screen
  parameters:
    api_url: *api_orchestrator
    api_key: "${ORCHESTRATOR_API_KEY}"
    api_model: "deepseek-chat"
    api_timeout: 180.0
    system_prompt_file: "//PKGSHARE:bob_central/prompts/orchestrator.md"
    stream: true
    max_tool_calls: 30
    max_tokens: 6000
    max_history_length: 25
    temperature: 0.2
    presence_penalty: 1.2
    skill_dir: "/ros2_ws/src/bob_central/skills"
    tool_interfaces: 
       - "//PKGSHARE:bob_llm/config/skill_tools.py"
       - "//PKGSHARE:bob_llm/config/ros_cli_tools.py"
  arguments:
    - --ros-args
    - --log-level
    - *log_level
    - -r
    - "llm_prompt:=/eva/logic/internal/query_timed"
    - -r
    - "llm_response:=/eva/logic/internal/specialist_response"
    - -r
    - "llm_stream:=~/internal/eva_stream"
    - -r
    - *eva_ns

# Bobassi: The Support Sidekick (For Busy States)
- name: brain_bobassi
  package: bob_llm
  executable: llm
  respawn: true
  output: screen
  parameters:
    api_url: *api_orchestrator
    api_key: "${ORCHESTRATOR_API_KEY}"
    api_model: "deepseek-chat"
    api_timeout: 30.0
    system_prompt_file: "//PKGSHARE:bob_central/prompts/bobassi.md"
    stream: true
    max_tool_calls: 1
    max_tokens: 500
    max_history_length: 10
    temperature: 0.5
    tool_interfaces: ['']
  arguments:
    - --ros-args
    - --log-level
    - *log_level
    - -r
    - "llm_prompt:=/eva/bobassi/user_query"
    - -r
    - "llm_response:=/eva/bobassi/response"
    - -r
    - "llm_stream:=~/internal/bobassi_stream"
    - -r
    - *eva_ns

# Eva REPL: Persistent Engineering Session
- name: repl
  package: bob_central
  executable: repl
  respawn: true
  output: screen
  arguments:
    - --ros-args
    - --log-level
    - info
    - -r
    - *eva_ns

