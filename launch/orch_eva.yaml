# Dashboard Visualization: Artwork Background
- name: art_observer
  package: bob_central
  executable: art_observer
  respawn: true
  output: screen
  parameters:
    image_path: "/root/eva/media/eva_artist.jpg"
    img_size: [320, 320]
    img_pos: [480, 20]
  arguments:
    - --ros-args
    - -r
    - *eva_ns

# Music Daemon Node
- name: music_daemon
  package: bob_central
  executable: music_daemon
  respawn: true
  output: screen
  arguments:
    - --ros-args
    - -r
    - *eva_ns

# Eva Short-Term Memory Daemon (ESTM)
- name: memory_daemon
  package: bob_central
  executable: memory_daemon
  respawn: true
  output: screen
  arguments:
    - --ros-args
    - --log-level
    - debug
    - -r
    - "user_query:=/eva/user_query"
    - -r
    - *eva_ns

# Eva's Agency & Curiosity Impulse Generator
- name: agency_daemon
  package: bob_central
  executable: agency_daemon
  respawn: true
  output: screen
  parameters:
    idle_threshold: 600.0
  arguments:
    - --ros-args
    - --log-level
    - info
    - -r
    - "user_query:=/eva/user_query"
    - -r
    - *eva_ns

# Eva's Auditory Synthesis Engine (Alarm & Telemetry)
- name: synth_node
  package: bob_synth
  executable: synth
  respawn: true
  output: screen
  arguments:
    - --ros-args
    - --log-level
    - info
    - -r
    - "audio_out:=/eva/streamer/in2"
    - -r
    - *synth_ns
