# Arguments anchor (Werte ohne extra Anführungszeichen)
- &face_ns __ns:=/eva/face

- name: face_bag
  package: bob_face
  executable: bag
  arguments:
    - --ros-args
    - -r
    - *face_ns
    - -r
    - face_marker_array:=marker_array_raw
    - -p
    - bag:=//PKGSHARE:bob_face/config/face_2023-12-05_17-53-25/face_2023-12-05_17-53-25_0.db3
    - -p
    - loop:=true
    - -p
    - rate:=30
    - -p
    - jitter_intensity:=0.005
    - -p
    - blend_duration:=10

- name: face_marker
  package: bob_face
  executable: face_marker
  arguments:
    - --ros-args
    - -r
    - *face_ns
    - -r
    - marker_array_in:=marker_array_raw
    - -r
    - marker_array_out:=marker_array
    - -p
    - marker_scale:=0.0

- name: sentiment
  package: bob_face
  executable: sentiment_node.py
  arguments:
    - --ros-args
    - -r
    - *face_ns
    - -r
    - analize:=/eva/tts/spoken_text
    - -r
    - face_color_override:=face_color_override
    - --log-level
    - debug
    - -p
    - cmap_name:=turbo
    - -p
    - buffer_size:=100
    - -p
    - smooth_alpha:=0.4
    - -p 
    - sensitivity:=3.0
    - -p 
    - buffer_size:=150
    - -p
    - model_dir:=/models

- name: motion_manager
  package: bob_face
  executable: motion_node.py
  arguments:
    - --ros-args
    - -r
    - *face_ns
    - -r
    - spoken_text:=llm_stream
    - -p
    - idle_sequences:=Calm,Smile,Thinking,Agree,Busy,Idle
    - -p
    - speaking_sequences:=Speaking

